# ==============================================================================
#   数据库一致性校验工具 (Database Consistency Comparator) — 配置文件
# ==============================================================================
#
#  使用方法：
#    1. 填写下方数据库节点信息
#    2. 根据需求调整 comparison / rpo / workload 参数
#    3. 运行：python cli.py -c config.yaml <子命令>
#
#  首次使用可先生成测试数据快速体验：
#    python cli.py -c config.yaml gen-data -n node1 --accounts 5000
#    python cli.py -c config.yaml node-compare -a node1 -b node2
#
# ==============================================================================

# ==============================================================================
#  一、数据库节点配置 (databases)
# ==============================================================================
#  在这里定义集群中的所有节点，每个节点是一个命名的连接信息块。
#  节点名称可以自定义（如 node1, node2, primary, standby 等），后面所有命令
#  用 -n / -a / -b 指定节点时，填的就是这里的名称。
#
#  支持配置任意数量的节点，比如一主两备就配三个。
# ==============================================================================

databases:

  # ---- 节点1（示例：主节点）----
  node1:
    host: 192.168.1.101           # 数据库服务器 IP 或主机名
    port: 54321                   # Kingbase 默认 54321，PostgreSQL 默认 5432
    dbname: testdb                # 数据库名
    user: system                  # 用户名
    password: "your_password"     # 密码（特殊字符请用引号括起来）
    connect_timeout: 10           # 连接超时秒数

  # ---- 节点2（示例：备节点）----
  node2:
    host: 192.168.1.102
    port: 54321
    dbname: testdb
    user: system
    password: "your_password"
    connect_timeout: 10

  # ---- 更多节点按需添加 ----
  # node3:
  #   host: 192.168.1.103
  #   port: 54321
  #   dbname: testdb
  #   user: system
  #   password: "xxx"
  #   connect_timeout: 10


# ==============================================================================
#  二、数据对比参数 (comparison)
# ==============================================================================
#  控制节点间数据对比（node-compare 命令）的行为。
# ==============================================================================

comparison:

  # ---- 数据库 schema ----
  #  要对比的表所在的 schema。Kingbase/PostgreSQL 默认是 public。
  schema: public

  # ---- 对比范围 ----
  #  tables: 手动指定要对比的表名列表，留空 = 对比该 schema 下所有用户表。
  #  示例：["accounts", "orders", "products"]
  tables: []

  #  exclude_tables: 排除列表，这些表不参与对比。
  #  工具内部使用的追踪表建议加到这里，避免干扰对比结果。
  exclude_tables:
    - _rpo_markers            # RPO 标记表
    - _rpo_snapshots          # RPO 快照表
    - _app_db_tracking        # 应用-DB 追踪表

  # ---- checksum 分块大小 ----
  #  checksum 引擎会将表按主键范围切成 N 块，每块计算一个 MD5。
  #  块太小 → 查询次数多、开销大；块太大 → 单次查询内存高。
  #  建议：百万行以下用 10000，千万行用 50000，亿级用 100000。
  chunk_size: 10000

  # ---- 并行度 ----
  #  同时对比的表/块数量。建议设为 CPU 核数，不宜超过数据库最大连接数。
  #  例如 4 核服务器可设 4，8 核可设 8。
  parallel: 4

  # ---- 对比引擎选择 ----
  #  node-compare 支持四种引擎，通过 --backend 参数指定：
  #
  #  checksum (默认) — 内置，分块 MD5 校验，速度快，适合百万行+大表快速扫描
  #  native          — 内置，EXCEPT 行级精确对比，能看到具体差异行，适合小表深度排查
  #  pg_comparator   — 外部工具，需单独安装 pg_comparator，功能成熟
  #  data_diff       — 外部工具，需 pip install data-diff，支持跨数据库类型对比
  #
  #  日常巡检推荐用 checksum（快），发现问题后用 native 定位具体差异行。


# ==============================================================================
#  三、RPO 检测参数 (rpo)
# ==============================================================================
#  RPO (Recovery Point Objective) = 恢复点目标，衡量故障后丢失了多少数据。
#  通过故障前"种植标记 + 快照"，故障后"验证标记 + 对比行数 + 检查序列空洞"
#  三管齐下来判断数据是否丢失。
#
#  使用流程：
#    1. python cli.py -c config.yaml rpo-plant -n node1    → 得到 batch_id
#    2. [手动触发故障：kill主节点 / 断网 / 主备切换]
#    3. python cli.py -c config.yaml rpo-check -n node1 -bid <batch_id>
# ==============================================================================

rpo:
  # ---- 追踪表所在的 schema ----
  #  RPO 工具会在数据库中创建两张表：_rpo_markers 和 _rpo_snapshots。
  #  这里指定这两张表建在哪个 schema 下。
  marker_schema: public


# ==============================================================================
#  四、业务负载参数 (workload)
# ==============================================================================
#  控制 run-workload 命令（Python 内置负载生成器）的默认行为。
#  如果使用 JMeter 作为负载生成器，下面的 schedule 巡检 + node-compare
#  配合使用更合适，此段参数可不关注。
# ==============================================================================

workload:
  # ---- 默认并发数 ----
  #  模拟的并发用户/线程数。例如 10 表示 10 个线程同时执行事务。
  #  具体值可以在 YAML 模板中覆盖。
  concurrency: 10

  # ---- 默认执行时长（秒）----
  #  业务负载持续运行多久。具体值可以在 YAML 模板中覆盖。
  duration: 300


# ==============================================================================
#  五、定时巡检参数 (schedule)
# ==============================================================================
#  配合 JMeter 持续下发业务的场景，工具以定时巡检的方式监控数据一致性。
#
#  典型场景：
#    JMeter 持续执行金融转账 ──▶ 数据库集群
#    本工具定时检查节点间数据是否一致、是否有数据丢失
#
#  启动方式：
#    python cli.py -c config.yaml schedule --interval 300 -- node-compare -a node1 -b node2
# ==============================================================================

schedule:
  # ---- 巡检间隔（秒）----
  #  0 = 单次执行（默认），>0 = 每隔 N 秒自动执行一次。
  #  建议：正常巡检用 300（5分钟），高频压测场景用 60（1分钟）。
  interval: 0

  # ---- 报告输出目录 ----
  #  巡检结果报告的存放路径。
  report_dir: ./reports


# ==============================================================================
#  六、日志参数 (logging)
# ==============================================================================
# ==============================================================================

logging:
  # ---- 日志级别 ----
  #  DEBUG: 最详细，包含每条 SQL 和分块信息
  #  INFO:  常规信息（推荐）
  #  WARNING: 只记录警告和错误
  #  ERROR: 只记录错误
  level: INFO

  # ---- 日志文件路径 ----
  #  日志同时输出到控制台和文件。设为空字符串则只输出到控制台。
  #  目录不存在时会自动创建。
  file: ./logs/comparator.log
